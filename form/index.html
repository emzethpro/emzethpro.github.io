<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form to JSON Converter</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --container-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 2rem;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--container-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #0f172a;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .help-text {
            font-size: 0.8rem;
            color: #64748b;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            align-self: flex-start;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .result-container {
            margin-top: 1rem;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        pre {
            background-color: #1e293b;
            color: #e2e8f0;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            margin: 0;
        }
        
        .copy-btn {
            background-color: #e2e8f0;
            color: #334155;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }
        
        .copy-btn:hover {
            background-color: #cbd5e1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Input Rule JSON Generator</h1>
        
        <form id="jsonForm">
            <div class="form-group">
                <label for="ruleKey">Rule ID</label>
                <input type="text" id="ruleKey" placeholder="contoh: rule_01" required>
            </div>



            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="contoh: Tempati Posisi Masing-Masing" required>
            </div>

            <div class="form-group">
                <label for="keywords">Keywords</label>
                <textarea id="keywords" placeholder="Pisahkan dengan koma (contoh: suami cuek, istri cemas, kurang perhatian)" required></textarea>
                <span class="help-text">Kata kunci dipisahkan menggunakan koma (,).</span>
            </div>

            <div class="form-group">
                <label for="contoh">Contoh</label>
                <textarea id="contoh" placeholder="Masukkan format:&#10;[Panduan]: ...&#10;[Nasihat]: ..." required></textarea>
                <span class="help-text">Gunakan format <b>[Panduan]:</b> untuk teori/prinsip dan <b>[Nasihat]:</b> untuk contoh penerapannya.</span>
            </div>

            <button type="submit">Generate JSON</button>
        </form>

        <div class="result-container" id="resultContainer" style="display: none;">
            <div class="result-header">
                <label>Hasil JSON:</label>
                <div style="display: flex; gap: 0.5rem;">
                    <button type="button" class="copy-btn" id="clearBtn" style="background-color: #fee2e2; color: #991b1b;">Clear Data</button>
                    <button type="button" class="copy-btn" id="copyBtn">Copy JSON</button>
                </div>
            </div>
            <pre id="jsonOutput"></pre>
        </div>
    </div>

    <script>
        let allRules = {};

        // Inisialisasi dari localStorage jika ada
        const storedData = localStorage.getItem('jsonRules');
        if (storedData) {
            try {
                allRules = JSON.parse(storedData);
                renderJSON();
            } catch (e) {
                console.error("Gagal membaca data dari local storage:", e);
            }
        }

        function renderJSON() {
            if (Object.keys(allRules).length === 0) {
                document.getElementById('resultContainer').style.display = 'none';
                window.generatedJSON = "";
                return;
            }
            
            const jsonString = JSON.stringify(allRules, null, 2);
            document.getElementById('jsonOutput').textContent = jsonString;
            document.getElementById('resultContainer').style.display = 'block';
            
            // Re-bind variabel untuk dicopy nanti
            window.generatedJSON = jsonString;
        }

        document.getElementById('jsonForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Ambil nilai dari form
            const ruleKey = document.getElementById('ruleKey').value.trim();
            const title = document.getElementById('title').value.trim();
            const keywordsRaw = document.getElementById('keywords').value;
            const contoh = document.getElementById('contoh').value.trim();

            // Proses keywords menjadi array
            const keywords = keywordsRaw.split(',')
                .map(k => k.trim())
                .filter(k => k.length > 0);

            // Tambahkan ke objek utama
            allRules[ruleKey] = {
                title: title,
                keywords: keywords,
                contoh: contoh
            };
            
            // Simpan ke local storage
            localStorage.setItem('jsonRules', JSON.stringify(allRules));

            // Tampilkan hasil
            renderJSON();
            
            // Kosongkan form untuk input selanjutnya
            this.reset();
            document.getElementById('ruleKey').focus();
        });

        document.getElementById('clearBtn').addEventListener('click', function() {
            if (confirm('Apakah Anda yakin ingin menghapus semua data JSON yang telah tersimpan?')) {
                allRules = {};
                localStorage.removeItem('jsonRules');
                renderJSON();
            }
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            if (window.generatedJSON) {
                navigator.clipboard.writeText(window.generatedJSON).then(() => {
                    const originalText = this.textContent;
                    this.textContent = 'Copied!';
                    setTimeout(() => {
                        this.textContent = originalText;
                    }, 2000);
                }).catch(err => {
                    console.error('Gagal mengcopy teks: ', err);
                });
            }
        });
    </script>
</body>
</html>
